name: .NET CI

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v5
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore geometrix-api/Geometrix.sln
    
    - name: Build
      run: dotnet build geometrix-api/Geometrix.sln --configuration Release --no-restore
    
    - name: Test
      run: dotnet test geometrix-api/Geometrix.sln --configuration Release --no-build --verbosity normal
